<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>语音拍照记录表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #4472C4, #2d5aa0);
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
    }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header p { font-size: 13px; opacity: 0.85; }

    .container { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* 当前输入区 */
    .input-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .input-card h2 { font-size: 15px; color: #333; margin-bottom: 16px; }

    /* 语音按钮 */
    .voice-btn {
      width: 100%;
      height: 64px;
      border-radius: 32px;
      border: none;
      background: linear-gradient(135deg, #4472C4, #2d5aa0);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .voice-btn:active { transform: scale(0.97); }
    .voice-btn.recording {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(231,76,60,0); }
    }

    /* 文字显示框 */
    .text-display {
      width: 100%;
      min-height: 80px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      color: #333;
      background: #fafafa;
      resize: none;
      outline: none;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .text-display:focus { border-color: #4472C4; background: white; }

    /* 图片区 */
    .photo-area { margin-bottom: 16px; }
    .photo-label { font-size: 14px; color: #666; margin-bottom: 10px; }
    .photo-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .photo-item {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-item .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.55);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-photo-btn {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      border: 2px dashed #c0c0c0;
      background: #f8f8f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #999;
      font-size: 12px;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .add-photo-btn span:first-child { font-size: 28px; }

    /* 添加行按钮 */
    .add-row-btn {
      width: 100%;
      height: 52px;
      border-radius: 12px;
      border: none;
      background: #27ae60;
      color: white;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .add-row-btn:active { background: #219a52; }

    /* 已记录列表 */
    .records-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .records-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .records-header h2 { font-size: 15px; color: #333; }
    .record-count {
      background: #4472C4;
      color: white;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 13px;
    }
    .record-item {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }
    .record-text {
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .record-images {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .record-images img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
    }
    .record-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .row-num { font-size: 12px; color: #999; }
    .delete-row-btn {
      border: none;
      background: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
      padding: 2px 6px;
    }
    .empty-tip {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 20px 0;
    }

    /* 导出按钮 */
    .export-btn {
      width: 100%;
      height: 56px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(243,156,18,0.35);
      -webkit-tap-highlight-color: transparent;
    }
    .export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .export-btn:not(:disabled):active { transform: scale(0.98); }

    /* 隐藏的文件输入 */
    #fileInput { display: none; }

    /* 提示 */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 14px;
      display: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>

<div class="header">
  <h1>🎤 语音拍照记录表</h1>
  <p>语音输入 + 拍照，自动生成Excel</p>
</div>

<div class="container">

  <!-- 输入区 -->
  <div class="input-card">
    <h2>➕ 新增一行记录</h2>

    <!-- 语音按钮 -->
    <button class="voice-btn" id="voiceBtn" onclick="toggleRecording()">
      <span id="voiceIcon">🎤</span>
      <span id="voiceText">按住说话（点击开始录音）</span>
    </button>

    <!-- 文字编辑框 -->
    <textarea class="text-display" id="textDisplay"
      placeholder="语音识别结果会显示在这里，也可以手动输入或修改..."></textarea>

    <!-- 图片区 -->
    <div class="photo-area">
      <div class="photo-label">📷 添加图片（最多3张）</div>
      <div class="photo-grid" id="photoGrid">
        <div class="add-photo-btn" onclick="addPhoto()">
          <span>＋</span>
          <span>拍照/选图</span>
        </div>
      </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" capture="environment" multiple onchange="handleFileSelect(event)">

    <!-- 添加到列表 -->
    <button class="add-row-btn" onclick="addRow()">
      ✅ 添加到记录列表
    </button>
  </div>

  <!-- 已记录列表 -->
  <div class="records-card">
    <div class="records-header">
      <h2>📋 已记录</h2>
      <span class="record-count" id="recordCount">0 行</span>
    </div>
    <div id="recordsList">
      <div class="empty-tip">暂无记录，添加第一行吧～</div>
    </div>
  </div>

  <!-- 导出按钮 -->
  <button class="export-btn" id="exportBtn" onclick="exportExcel()" disabled>
    📊 导出 Excel 文件
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
  // ==================== 状态 ====================
  let records = [];           // 所有行的数据
  let currentImages = [];     // 当前正在添加的图片（base64）
  let recognition = null;     // 语音识别对象
  let isRecording = false;

  // ==================== 语音识别 ====================
  function initSpeech() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      showToast('当前浏览器不支持语音识别，请用Chrome或Safari');
      return null;
    }
    const rec = new SpeechRecognition();
    rec.lang = 'zh-CN';
    rec.continuous = true;        // 持续识别
    rec.interimResults = true;    // 显示中间结果

    rec.onresult = (event) => {
      let finalText = '';
      let interimText = '';
      for (let i = 0; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          finalText += event.results[i][0].transcript;
        } else {
          interimText += event.results[i][0].transcript;
        }
      }
      document.getElementById('textDisplay').value = finalText + interimText;
    };

    rec.onerror = (e) => {
      console.error('语音错误:', e.error);
      if (e.error === 'not-allowed') {
        showToast('请允许麦克风权限后重试');
      }
      stopRecording();
    };

    rec.onend = () => {
      if (isRecording) rec.start(); // 自动续录
    };

    return rec;
  }

  function toggleRecording() {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  }

  function startRecording() {
    if (!recognition) recognition = initSpeech();
    if (!recognition) return;
    recognition.start();
    isRecording = true;
    document.getElementById('voiceBtn').classList.add('recording');
    document.getElementById('voiceIcon').textContent = '⏹';
    document.getElementById('voiceText').textContent = '录音中...点击停止';
  }

  function stopRecording() {
    if (recognition) recognition.stop();
    isRecording = false;
    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voiceIcon').textContent = '🎤';
    document.getElementById('voiceText').textContent = '按住说话（点击开始录音）';
  }

  // ==================== 图片处理 ====================
  function addPhoto() {
    if (currentImages.length >= 3) {
      showToast('最多添加3张图片');
      return;
    }
    document.getElementById('fileInput').click();
  }

  function handleFileSelect(event) {
    const files = event.target.files;
    for (let file of files) {
      if (currentImages.length >= 3) break;
      const reader = new FileReader();
      reader.onload = (e) => {
        currentImages.push(e.target.result);
        renderPhotoGrid();
      };
      reader.readAsDataURL(file);
    }
    event.target.value = ''; // 清空，允许重复选同一张
  }

  function removePhoto(index) {
    currentImages.splice(index, 1);
    renderPhotoGrid();
  }

  function renderPhotoGrid() {
    const grid = document.getElementById('photoGrid');
    grid.innerHTML = '';

    currentImages.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'photo-item';
      item.innerHTML = `
        <img src="${src}" alt="图片${i+1}">
        <button class="remove-btn" onclick="removePhoto(${i})">×</button>
      `;
      grid.appendChild(item);
    });

    if (currentImages.length < 3) {
      const addBtn = document.createElement('div');
      addBtn.className = 'add-photo-btn';
      addBtn.onclick = addPhoto;
      addBtn.innerHTML = '<span>＋</span><span>拍照/选图</span>';
      grid.appendChild(addBtn);
    }
  }

  // ==================== 添加行 ====================
  function addRow() {
    const text = document.getElementById('textDisplay').value.trim();
    if (!text && currentImages.length === 0) {
      showToast('请先录音或添加图片');
      return;
    }
    records.push({
      text: text,
      images: [...currentImages]
    });

    // 清空输入区
    document.getElementById('textDisplay').value = '';
    currentImages = [];
    renderPhotoGrid();
    if (isRecording) stopRecording();

    renderRecordsList();
    showToast('已添加第 ' + records.length + ' 行 ✅');
  }

  // ==================== 渲染列表 ====================
  function renderRecordsList() {
    const list = document.getElementById('recordsList');
    const countEl = document.getElementById('recordCount');
    const exportBtn = document.getElementById('exportBtn');

    countEl.textContent = records.length + ' 行';
    exportBtn.disabled = records.length === 0;

    if (records.length === 0) {
      list.innerHTML = '<div class="empty-tip">暂无记录，添加第一行吧～</div>';
      return;
    }

    list.innerHTML = '';
    records.forEach((row, i) => {
      const item = document.createElement('div');
      item.className = 'record-item';
      const imgsHtml = row.images.map(src =>
        `<img src="${src}" alt="图">`
      ).join('');
      item.innerHTML = `
        <div class="record-item-header">
          <span class="row-num">第 ${i+1} 行</span>
          <button class="delete-row-btn" onclick="deleteRow(${i})">🗑 删除</button>
        </div>
        <div class="record-text">${row.text || '（无文字）'}</div>
        ${row.images.length > 0 ? `<div class="record-images">${imgsHtml}</div>` : ''}
      `;
      list.appendChild(item);
    });
  }

  function deleteRow(index) {
    records.splice(index, 1);
    renderRecordsList();
    showToast('已删除');
  }

  // ==================== 导出Excel ====================
  async function exportExcel() {
    if (records.length === 0) return;
    showToast('正在生成Excel，请稍候...');
    document.getElementById('exportBtn').disabled = true;

    try {
      const response = await fetch('/generate-excel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows: records })
      });

      if (!response.ok) throw new Error('服务器错误');

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '语音拍照记录_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '') + '.xlsx';
      a.click();
      URL.revokeObjectURL(url);
      showToast('导出成功！请查看下载文件 📊');
    } catch (err) {
      showToast('导出失败：' + err.message);
    } finally {
      document.getElementById('exportBtn').disabled = false;
    }
  }

  // ==================== 工具函数 ====================
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
</script>

</body>
</html>
