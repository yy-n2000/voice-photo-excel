<div class="toast" id="toast"></div>

<script>
// ===================== 讯飞配置 =====================
const XF_APPID      = 'ed958adf';
const XF_API_KEY    = '21849580283bff759bb2a50f6ed0db2d';
const XF_API_SECRET = 'Yjk3ZDBkNmVkMmRjZWNjNTQ5MTEzYjEy';

// ===================== 全局状态 =====================
/* ══ 全局状态 ══ */
let records       = [];
let currentImages = [];
let isRecording   = false;
let mediaRecorder = null;
let audioChunks   = [];
let safetyTimer   = null;

// ===================== IndexedDB 存储（替代 localStorage，容量大得多）=====================
const DB_NAME    = 'voiceExcelDB';
const DB_VERSION = 1;
const STORE_NAME = 'records';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (db) { resolve(db); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror   = (e) => reject(e.target.error);
  });
}

// 图片压缩：把 base64 缩小到最长边 1200px，质量 0.75，节省约 70-90% 空间
function compressImage(dataUrl, maxSize = 1200, quality = 0.75) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      const w = Math.round(img.width  * scale);
      const h = Math.round(img.height * scale);
      const cvs = document.createElement('canvas');
      cvs.width = w; cvs.height = h;
      cvs.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(cvs.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl); // 失败就原样保留
    img.src = dataUrl;
  });
}

// 保存到 IndexedDB（写入前先压缩所有图片）
async function saveToStorage() {
  try {
    const idb = await openDB();

    // 压缩当前 records 里的图片
    const compressed = await Promise.all(records.map(async (row) => ({
      ...row,
      images: await Promise.all((row.images || []).map(img => compressImage(img)))
    })));

    const tx    = idb.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);

    // 先清空旧数据，再逐行写入
    store.clear();
    compressed.forEach((row, i) => store.put({ id: i, ...row }));

    tx.oncomplete = () => {};
    tx.onerror    = (e) => console.error('IndexedDB 写入失败', e.target.error);
  } catch(e) {
    console.error('保存数据失败', e);
  }
}

// 从 IndexedDB 读取数据
async function loadFromStorage() {
  try {
    const idb   = await openDB();
    const tx    = idb.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req   = store.getAll();
    req.onsuccess = () => {
      const rows = req.result;
      if (rows && rows.length) {
        // 按 id 排序，去掉 id 字段还原成原始格式
        records = rows
          .sort((a, b) => a.id - b.id)
          .map(({ id, ...rest }) => rest);
        renderRecordsList();
        showToast(`已恢复 ${records.length} 行记录`);
      }
    };
    req.onerror = (e) => console.error('读取数据失败', e.target.error);
  } catch(e) {
    console.error('恢复数据失败', e);
  }
}

// 页面加载完成后恢复数据
window.addEventListener('load', loadFromStorage);

// ===================== 编辑器状态 =====================
let editingIndex  = -1;    // 正在编辑哪张图片
let tool          = 'pen';
let drawColor     = '#ff3b30';
let drawSize      = 4;
let strokes       = [];    // 所有笔画（用于撤销）
let currentStroke = null;
let isDrawing     = false;
let baseImage     = null;  // 原图Image对象
let canvas, ctx;
let startX, startY;

// ===================== 讯飞鉴权 =====================
async function getXFUrl() {
  const host = 'iat-api.xfyun.cn';
  const date = new Date().toUTCString();
  const requestLine = 'GET /v2/iat HTTP/1.1';
  const signOrigin = `host: ${host}\ndate: ${date}\n${requestLine}`;
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(XF_API_SECRET), { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(signOrigin));
  const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig)));
  const authOrigin = `api_key="${XF_API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${sigB64}"`;
  return `wss://${host}/v2/iat?authorization=${encodeURIComponent(btoa(authOrigin))}&date=${encodeURIComponent(date)}&host=${host}`;
}

// ===================== PCM转换 =====================
function convertToPCM(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('读取音频失败'));
    reader.onload = (e) => {
      let ctx2;
      try { ctx2 = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 }); }
      catch(err) { return reject(new Error('AudioContext失败')); }
      const timeout = setTimeout(() => { try{ctx2.close();}catch(_){} reject(new Error('解码超时')); }, 8000);
      ctx2.decodeAudioData(e.target.result,
        (buf) => {
          clearTimeout(timeout);
          const pcm = buf.getChannelData(0);
          const i16 = new Int16Array(pcm.length);
          for(let i=0;i<pcm.length;i++) i16[i]=Math.max(-32768,Math.min(32767,Math.round(pcm[i]*32767)));
          ctx2.close().catch(()=>{});
          resolve(new Blob([i16.buffer], {type:'audio/L16'}));
        },
        (err) => { clearTimeout(timeout); try{ctx2.close();}catch(_){} resolve(blob); }
      );
    };
    reader.readAsArrayBuffer(blob);
  });
}

// ===================== 讯飞识别 =====================
function recognizeAudio(audioBlob) {
  return new Promise(async (resolve, reject) => {
    let url;
    try { url = await getXFUrl(); } catch(e) { return reject(new Error('鉴权失败')); }
    let pcmBlob;
    try { pcmBlob = await convertToPCM(audioBlob); } catch(e) { return reject(new Error('音频处理失败')); }
    let pcmArray;
    try { pcmArray = new Uint8Array(await pcmBlob.arrayBuffer()); } catch(e) { return reject(new Error('音频读取失败')); }

    const segments = [];
    let settled = false;
    const done = (t) => { if(settled)return; settled=true; resolve(t); };
    const fail = (e) => { if(settled)return; settled=true; reject(e); };

    let ws;
    try { ws = new WebSocket(url); } catch(e) { return fail(new Error('WebSocket创建失败')); }

    const wsTimeout = setTimeout(() => { try{ws.close();}catch(_){} done(segments.join('')); }, 60000);

    ws.onopen = () => {
      const FRAME = 1280; let offset=0, idx=0;
      const send = () => {
        if(settled) return;
        if(offset >= pcmArray.length) {
          try { ws.send(JSON.stringify({data:{status:2,format:'audio/L16;rate=16000',encoding:'raw',audio:''}})); } catch(_){}
          return;
        }
        const chunk = pcmArray.slice(offset, offset+FRAME);
        const b64   = btoa(String.fromCharCode(...chunk));
        const isFirst = idx===0;
        const frame = {
          ...(isFirst?{common:{app_id:XF_APPID}}:{}),
          ...(isFirst?{business:{language:'zh_cn',domain:'iat',accent:'mandarin',vad_eos:5000,dwa:'wpgs'}}:{}),
          data:{status:isFirst?0:1,format:'audio/L16;rate=16000',encoding:'raw',audio:b64}
        };
        try{ws.send(JSON.stringify(frame));}catch(_){return;}
        offset+=FRAME; idx++;
        setTimeout(send,40);
      };
      send();
    };

    ws.onmessage = (e) => {
      let msg; try{msg=JSON.parse(e.data);}catch(_){return;}
      if(msg.code!==0){clearTimeout(wsTimeout);try{ws.close();}catch(_){} fail(new Error(`讯飞错误(${msg.code}):${msg.message}`));return;}
      if(msg.data?.result){
        const result=msg.data.result;
        let text='';
        (result.ws||[]).forEach(w=>w.cw.forEach(c=>{text+=c.w;}));
        const pgs=result.pgs, rg=result.rg;
        if(pgs==='rpl'&&Array.isArray(rg)&&rg.length===2) segments.splice(rg[0]-1,rg[1]-rg[0]+1,text);
        else segments.push(text);
        document.getElementById('textDisplay').value=segments.join('');
      }
      if(msg.data?.status===2){clearTimeout(wsTimeout);try{ws.close();}catch(_){} done(segments.join(''));}
    };
    ws.onerror=()=>{clearTimeout(wsTimeout);fail(new Error('WebSocket连接失败'));};
    ws.onclose=()=>{clearTimeout(wsTimeout);done(segments.join(''));};
  });
}

// ===================== 录音 =====================
async function toggleRecording() {
  if(isRecording) stopRecording(); else await startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const mime = ['audio/webm;codecs=pcm','audio/webm','audio/ogg'].find(t=>MediaRecorder.isTypeSupported(t))||'';
    mediaRecorder = new MediaRecorder(stream, mime?{mimeType:mime}:{});
    audioChunks = [];
    document.getElementById('textDisplay').value = '';

    mediaRecorder.ondataavailable = e => { if(e.data&&e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      setBtnProcessing();
      clearTimeout(safetyTimer);
      safetyTimer = setTimeout(()=>{showToast('识别超时，请重试');setBtnIdle();},35000);
      try {
        if(!audioChunks.length) throw new Error('未录到音频');
        const blob   = new Blob(audioChunks,{type:mime||'audio/webm'});
        const result = await recognizeAudio(blob);
        document.getElementById('textDisplay').value = result;
        if(!result.trim()) showToast('未识别到内容，请重试');
      } catch(err) {
        showToast('识别失败：'+err.message);
        document.getElementById('textDisplay').value='';
      } finally {
        clearTimeout(safetyTimer); setBtnIdle();
      }
    };
    mediaRecorder.onerror=()=>{showToast('录音出错');isRecording=false;setBtnIdle();};
    mediaRecorder.start(100);
    isRecording=true;
    setBtnRecording();
  } catch(err) {
    if(err.name==='NotAllowedError') showToast('请允许麦克风权限');
    else showToast('录音失败：'+err.message);
    setBtnIdle();
  }
}

function stopRecording() {
  if(mediaRecorder&&isRecording){isRecording=false;try{mediaRecorder.stop();}catch(e){setBtnIdle();}}
}

function setBtnIdle() {
  document.getElementById('voiceBtn').className='voice-btn';
  document.getElementById('voiceBtnInner').innerHTML='🎤 点击开始录音';
  const s=document.getElementById('voiceStatus'); s.textContent='点击按钮开始说话，说完再次点击停止识别'; s.className='voice-status';
}
function setBtnRecording() {
  document.getElementById('voiceBtn').className='voice-btn recording';
  document.getElementById('voiceBtnInner').innerHTML=`<div class="wave-bars">${Array(6).fill('<div class="wave-bar"></div>').join('')}</div><span>录音中… 点击停止</span>`;
  const s=document.getElementById('voiceStatus'); s.textContent='🔴 正在录音，说完后点击按钮停止'; s.className='voice-status recording';

  document.getElementById('voiceBtnInner').innerHTML='⏳ 识别中，请稍候…';
  const s=document.getElementById('voiceStatus'); s.textContent='正在识别，请稍候...'; s.className='voice-status processing';

// ===================== 图片处理 =====================
function addPhoto() {
  if(currentImages.length>=3){showToast('最多添加3张');return;}
  document.getElementById('fileInput').click();
}
function handleFileSelect(e) {
  for(const file of e.target.files){
    if(currentImages.length>=3) break;
    const reader=new FileReader();
    reader.onload=ev=>{currentImages.push(ev.target.result);renderPhotoGrid();};
    reader.readAsDataURL(file);
  }
  e.target.value='';
}
function removePhoto(i){currentImages.splice(i,1);renderPhotoGrid();}

function renderPhotoGrid() {
  const grid=document.getElementById('photoGrid');
  grid.innerHTML='';
  currentImages.forEach((src,i)=>{
    const d=document.createElement('div');
    d.className='photo-item';
    d.innerHTML=`<img src="${src}">
      <div class="btn-row">
        <button class="edit-btn"   onclick="openEditor(${i})">✏️标注</button>
        <button class="remove-btn" onclick="removePhoto(${i})">✕删除</button>
      </div>`;
    grid.appendChild(d);
  });
  if(currentImages.length<3){
    const btn=document.createElement('div');
    btn.className='add-photo-btn'; btn.onclick=addPhoto;
    btn.innerHTML='<span>＋</span><span>拍照/选图</span>';
    grid.appendChild(btn);
  }
}

// ===================== 图片标注编辑器 =====================
function openEditor(index) {
  editingIndex = index;
  strokes      = [];
  isDrawing    = false;
  canvas = document.getElementById('editorCanvas');
  ctx    = canvas.getContext('2d');

  const img = new Image();
  img.onload = () => {
    baseImage = img;
    // 适配屏幕
    const maxW = window.innerWidth  - 20;
    const maxH = window.innerHeight - 180;
    const scale = Math.min(maxW/img.width, maxH/img.height, 1);
    canvas.width  = img.width  * scale;
    canvas.height = img.height * scale;
    redrawCanvas();
    document.getElementById('editorOverlay').classList.add('show');
  };
  img.src = currentImages[index];
}

function redrawCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(baseImage,0,0,canvas.width,canvas.height);
  strokes.forEach(stroke => drawStroke(stroke, false));
}

function drawStroke(stroke, isPreview) {
  ctx.save();
  ctx.strokeStyle = stroke.color;
  ctx.fillStyle   = stroke.color;
  ctx.lineWidth   = stroke.size;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  if(stroke.type === 'pen') {
    ctx.beginPath();
    stroke.points.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
  } else if(stroke.type === 'circle') {
    const dx = stroke.x2 - stroke.x1, dy = stroke.y2 - stroke.y1;
    const rx = Math.abs(dx)/2, ry = Math.abs(dy)/2;
    const cx = stroke.x1 + dx/2, cy = stroke.y1 + dy/2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  } else if(stroke.type === 'arrow') {
    const x1=stroke.x1,y1=stroke.y1,x2=stroke.x2,y2=stroke.y2;
    const angle = Math.atan2(y2-y1, x2-x1);
    const headLen = Math.max(15, stroke.size*4);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-headLen*Math.cos(angle-Math.PI/7), y2-headLen*Math.sin(angle-Math.PI/7));
    ctx.lineTo(x2-headLen*Math.cos(angle+Math.PI/7), y2-headLen*Math.sin(angle+Math.PI/7));
    ctx.closePath(); ctx.fill();
  } else if(stroke.type === 'text') {
    ctx.font = `bold ${stroke.size*5+10}px PingFang SC, sans-serif`;
    ctx.fillText(stroke.text, stroke.x1, stroke.y1);
  }
  ctx.restore();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x:(src.clientX-rect.left)*scaleX, y:(src.clientY-rect.top)*scaleY };
}

// 鼠标/触摸事件
function onStart(e) {
  e.preventDefault();
  const pos = getPos(e);
  startX = pos.x; startY = pos.y;
  if(tool==='text') {
    const t = prompt('请输入文字：');
    if(t) { strokes.push({type:'text',color:drawColor,size:drawSize,x1:pos.x,y1:pos.y,text:t}); redrawCanvas(); }
    return;
  }
  isDrawing = true;
  currentStroke = {
    type: tool, color: drawColor, size: drawSize,
    x1: pos.x, y1: pos.y, x2: pos.x, y2: pos.y,
    points: [{x:pos.x,y:pos.y}]
  };
}

function onMove(e) {
  e.preventDefault();
  if(!isDrawing||!currentStroke) return;
  const pos = getPos(e);
  if(tool==='pen') {
    currentStroke.points.push({x:pos.x,y:pos.y});
  } else {
    currentStroke.x2 = pos.x;
    currentStroke.y2 = pos.y;
  }
  redrawCanvas();
  drawStroke(currentStroke, true);
}

function onEnd(e) {
  e.preventDefault();
  if(!isDrawing||!currentStroke) return;
  isDrawing = false;
  strokes.push({...currentStroke});
  currentStroke = null;
  redrawCanvas();
}

canvas = document.getElementById('editorCanvas');
canvas.addEventListener('mousedown',  onStart, {passive:false});
canvas.addEventListener('mousemove',  onMove,  {passive:false});
canvas.addEventListener('mouseup',    onEnd,   {passive:false});
canvas.addEventListener('touchstart', onStart, {passive:false});
canvas.addEventListener('touchmove',  onMove,  {passive:false});
canvas.addEventListener('touchend',   onEnd,   {passive:false});

function setTool(t) {
  tool = t;
  ['pen','circle','arrow','text'].forEach(name => {
    document.getElementById('tool'+name.charAt(0).toUpperCase()+name.slice(1)).classList.toggle('active', name===t);
  });
}
function setColor(c) {
  drawColor = c;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('active', d.dataset.color===c));
}
function setSize(s) { drawSize = parseInt(s); }
function undoStroke() { if(strokes.length) { strokes.pop(); redrawCanvas(); } }
function clearAnnotations() { strokes=[]; redrawCanvas(); }

function closeEditor() { document.getElementById('editorOverlay').classList.remove('show'); }

function saveAnnotation() {
  // 把canvas内容保存回currentImages，质量与 compressImage 保持一致
  currentImages[editingIndex] = canvas.toDataURL('image/jpeg', 0.75);
  closeEditor();
  renderPhotoGrid();
  showToast('标注已保存 ✅');
}

// ===================== 添加行 =====================
async function addRow() {
  const text=document.getElementById('textDisplay').value.trim();
  if(!text&&currentImages.length===0){showToast('请先录音或添加图片');return;}
  // ✅ 修复：push 前先压缩图片，避免原始大图发给服务器
  const compressedImages = await Promise.all(currentImages.map(img => compressImage(img)));
  records.push({text,images:compressedImages});
  document.getElementById('textDisplay').value='';
  currentImages=[];
  renderPhotoGrid();
  renderRecordsList();
  saveToStorage();
  showToast(`已添加第 ${records.length} 行 ✅`);
}

// ===================== 记录列表 =====================
function renderRecordsList() {
  const list=document.getElementById('recordsList');
  document.getElementById('recordCount').textContent=`${records.length} 行`;
  document.getElementById('exportBtn').disabled=records.length===0;
  if(!records.length){list.innerHTML='<div class="empty-tip">暂无记录，添加第一行吧～</div>';return;}
  list.innerHTML='';
  records.forEach((row,i)=>{
    const d=document.createElement('div'); d.className='record-item';
    d.innerHTML=`
      <div class="record-item-header">
        <span class="row-num">第 ${i+1} 行</span>
        <button class="delete-row-btn" onclick="deleteRow(${i})">🗑 删除</button>
      </div>
      <div class="record-text">${row.text||'（无文字）'}</div>
      ${row.images.length?`<div class="record-images">${row.images.map(s=>`<img src="${s}">`).join('')}</div>`:''}`;
    list.appendChild(d);
  });
}
function deleteRow(i){records.splice(i,1);renderRecordsList();saveToStorage();showToast('已删除');}
function clearAllRecords() {
  if (!records.length) return;
  if (!confirm(`确定清空全部 ${records.length} 行记录？`)) return;
  records = [];
  renderRecordsList();
  saveToStorage();
  showToast('已清空所有记录');
}
// ===================== 导出Excel =====================
async function exportExcel() {
  if(!records.length) return;
  showToast('正在生成Excel，请稍候...');
  document.getElementById('exportBtn').disabled=true;
  try {
    const res=await fetch('/generate-excel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rows:records})});
    if(!res.ok) throw new Error('服务器错误 '+res.status);
    const blob=await res.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`语音拍照记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'')}.xlsx`;
    a.click();
    showToast('导出成功 📊');
  } catch(err){showToast('导出失败：'+err.message);}
  finally{document.getElementById('exportBtn').disabled=false;}
}

// ===================== Toast =====================
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
